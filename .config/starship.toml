# format = " took [$duration]($style)"
#
# [directory]
# truncation_length = 5
# format = "[$path]($style)[$lock_symbol]($lock_style) "
#
# [git_branch]
# format = " [$symbol$branch]($style) "
# symbol = " 🌴 "
# style = "bold yellow"
#
# [git_commit]
# commit_hash_length = 8
# style = "bold white"
#
# [git_state]
# format = '[\($state( $progress_current of $progress_total)\)]($style) '
#
# [git_status]
# conflicted = "⚔️ "
# ahead = "🏎️ 💨 ×${count}"
# behind = "🐢 ×${count}"
# diverged = "🔱 🏎️ 💨 ×${ahead_count} 🐢 ×${behind_count}"
# untracked = "🛤️  ×${count}"
# stashed = "📦 "
# modified = "📝 ×${count}"
# staged = "🗃️  ×${count}"
# renamed = "📛 ×${count}"
# deleted = "🗑️  ×${count}"
# style = "bright-white"
# format = "$all_status$ahead_behind"
#
# [hostname]
# ssh_only = false
# format = "<[$hostname]($style)>"
# trim_at = "-"
# style = "bold dimmed white"
# disabled = true
#
# [julia]
# format = "[$symbol$version]($style) "
# symbol = "ஃ "
# style = "bold green"
#
# [package]
# disabled = true
#
# [python]
# format = "[$symbol$version]($style) "
# style = "bold green"
#
# [rust]
# format = "[$symbol$version]($style) "
# style = "bold green"
#
# [time]
# time_format = "%T"
# format = "🕙 $time($style) "
# style = "bright-white"
# disabled = false
#
# [[battery.display]]
# threshold = 100
# style = "bold red"
#
# [username]
# style_user = "bold dimmed blue"
# show_always = false
#
# [nodejs]
# format = "via [🤖 $version](bold green) "

#Preset
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#86BBD8 bg:#FF69B4)\
$docker_context\
[](fg:#FF69B4 bg:#33658A)\
$time\
[](bg: #33658A)\
$line_break\
$character\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#FFFFFF bg:#9A348E"
style_root = "fg:#FFFFFF bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:#FFFFFF bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "fg:#000000 bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "🐳"
style = "fg:#000000 bg:#FF69B4"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:#000000 bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#000000 bg:#FCA17D"
conflicted = "⚔️ "
ahead = "🏎️ 💨 ×${count}"
behind = "🐢 ×${count}"
diverged = "🔱 🏎️ 💨 ×${ahead_count} 🐢 ×${behind_count}"
untracked = "🛤️  ×${count}"
stashed = "📦 "
modified = "📝 ×${count}"
staged = "🗃️  ×${count}"
renamed = "📛 ×${count}"
deleted = "🗑️  ×${count}"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "🤖"
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:#000000 bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:#FFFFFF bg:#33658A"
format = '[ ♥ $time ]($style)'
